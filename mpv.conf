# ============================================
# ULTIMATE MPV CONFIG (Patched & Flawless)
# Tuned for Max Quality (Plugged In)
# ============================================

##################
## VIDEO OUTPUT ##
##################
vo=gpu-next
gpu-api=opengl
gpu-context=wayland

##################
## HW DECODING  ##
##################
hwdec=auto-safe
# hwdec-codecs=all removed per best practice; auto-safe handles this perfectly

##################
## SCALING      ##
##################
profile=gpu-hq
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell
correct-downscaling=yes

##################
## DEBANDING    ##
##################
deband=yes
deband-iterations=2
deband-threshold=48
deband-range=16

##################
## INTERPOLATION (Smooth Motion)
##################
# Enabled permanently since you are plugged in
video-sync=display-resample
interpolation=yes
tscale=oversample

##################
## AUDIO        ##
##################
ao=pipewire,alsa
volume-max=150
volume=100
alang=eng,jpn
# Smoothed dynaudnorm to prevent background music pumping in anime
af-add=lavfi=[dynaudnorm=f=200:g=20:p=0.95]

##################
## SUBTITLES    ##
##################
sub-auto=fuzzy
sub-file-paths=subs:subtitles:Subs
slang=eng,enUS
embeddedfonts=yes
sub-fix-timing=yes
sub-font="Sans"
sub-font-size=55
sub-bold=yes
sub-color=#FFFFFF
sub-border-color=#000000
sub-border-size=2.4
sub-shadow-color=#000000
sub-shadow-offset=1

##################
## CACHE        ##
##################
cache=yes
demuxer-max-bytes=150MiB
demuxer-max-back-bytes=75MiB
cache-secs=60
ytdl-format=bestvideo[height<=?1080]+bestaudio/best

##################
## SCREENSHOTS  ##
##################
screenshot-format=png
screenshot-high-quality=yes
screenshot-directory=~/Pictures/mpv_screenshots
screenshot-template=%F-%wH.%wM.%wS

##################
## QOL / UX     ##
##################
save-position-on-quit=yes
resume-playback=yes
save-volume-on-quit=yes
osc=yes
osd-bar=yes
osd-duration=2000
osd-level=1
osd-font-size=32
border=no
title='${filename}'
autofit-larger=90%x90%
keepaspect-window=yes
keep-open=yes
prefetch-playlist=yes
stop-screensaver=always
mouse-move-uses-input-hint=yes
cursor-autohide=1000

