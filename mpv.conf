# ============================================
# MPV CONFIG — Intel Iris Xe (i5-1135G7) + MX330 (unused for video)
# Garuda Arch / Hyperland / Wayland / PipeWire / 1920x1080@60Hz panel
# mpv v0.41.0
# ============================================

##################
## VIDEO OUTPUT ##
##################
vo=gpu-next
gpu-api=vulkan                  # ANV Intel Vulkan driver, zero-copy dma-buf with vaapi decode
gpu-context=wayland

##################
## HW DECODING  ##
##################
hwdec=auto-safe                 # tries vaapi first, falls back to software if unsupported
hwdec-codecs=all                # needed so AV1/HEVC etc. actually attempt hw decode
# vaapi-device=/dev/dri/renderD128   # uncomment if mpv ever grabs the NVIDIA node by mistake

##################
## SCALING      ##
##################
profile=gpu-hq
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell
correct-downscaling=yes

##################
## DEBANDING    ##
##################
deband=yes
deband-iterations=2
deband-threshold=48
deband-range=16

##################
## INTERPOLATION (smooths 24fps content on your 60Hz panel)
##################
# Always on. Costs some GPU/battery — toggle off per-file with Ctrl+i if you want.
video-sync=display-resample
interpolation=yes
tscale=oversample

##################
## AUDIO        ##
##################
ao=pipewire
volume=100
volume-max=150
alang=eng,jpn

# Dialogue-leveling for anime (quiet talk + loud SFX in the same scene).
# Labeled so it can be toggled at runtime without touching the rest of the af chain.
# Tuned for smoothness (long window, slower adaptation) rather than max loudness,
# since a short/fast window is what actually causes audible "pumping."
af-add=@dnorm:lavfi=[dynaudnorm=f=500:g=45:p=0.95:m=8]

##################
## SUBTITLES    ##
##################
sub-auto=fuzzy
sub-file-paths=subs:subtitles:Subs
slang=eng,enUS
embeddedfonts=yes
sub-fix-timing=yes
sub-font="Sans"
sub-font-size=48
sub-bold=yes
sub-color=#FFFFFF
sub-border-color=#000000
sub-border-size=2.4
sub-shadow-color=#000000
sub-shadow-offset=1

##################
## CACHE        ##
##################
cache=yes
demuxer-max-bytes=150MiB
demuxer-max-back-bytes=75MiB
cache-secs=60
ytdl-format=bestvideo[height<=?1080]+bestaudio/best

##################
## SCREENSHOTS  ##
##################
screenshot-format=png
screenshot-high-quality=yes
screenshot-directory=~/Pictures/mpv_screenshots
screenshot-template=%F-%wH.%wM.%wS

##################
## QOL / UX     ##
##################
save-position-on-quit=yes
resume-playback=yes
save-volume-on-quit=yes
osc=yes
osd-bar=yes
osd-duration=2000
osd-level=1
osd-font-size=32
border=no
title='${filename}'
autofit-larger=90%x90%
keepaspect-window=yes
keep-open=yes
prefetch-playlist=yes
stop-screensaver=always
mouse-move-uses-input-hint=yes
cursor-autohide=1000
