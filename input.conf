# ============================================
# INTUITIVE KEYBINDS (MPC-HC / YouTube-style)
# ============================================

# Seeking
RIGHT       seek 5
LEFT        seek -5
UP          seek 60
DOWN        seek -60
Shift+RIGHT seek 1 exact
Shift+LEFT  seek -1 exact

# Volume (explicit step of 5, overrides mpv's default step of 2)
WHEEL_UP    add volume 5
WHEEL_DOWN  add volume -5
W           add volume 5
X           add volume -5
m           cycle mute

# Playback speed
]   add speed 0.1
[   add speed -0.1
BS  set speed 1.0

# Play / pause
SPACE cycle pause
p     cycle pause

# Tracks
a cycle audio
s cycle sub
v cycle sub-visibility

# Screenshot (lowercase s is remapped above to subtitle cycling, so screenshot lives on Shift+S)
S screenshot video

# Fullscreen — single click is left alone (OSC needs it), double-click toggles fullscreen
f             cycle fullscreen
MBTN_LEFT_DBL cycle fullscreen
ESC           set fullscreen no

# Quit (saves position automatically via save-position-on-quit)
q quit

# Playlist
> playlist-next
< playlist-prev

# Toggle deband (useful if a video looks overly smoothed/plastic-y)
D cycle deband

# Toggle interpolation per-file (moved off "I" — mpv's built-in stats overlay
# already uses i/I by default, this keeps both available)
Ctrl+i cycle interpolation

# Toggle dialogue-leveling filter per-file (some anime/movies sound "squashed" with it on)
Ctrl+n af toggle @dnorm

# Toggle hw decode on/off (handy for isolating a playback bug — if it plays fine
# with hwdec off, the issue is the vaapi decoder path, not the file)
Ctrl+h cycle-values hwdec "auto-safe" "no"

# Aspect ratio override (fixes stretched/mis-flagged videos)
A cycle-values video-aspect-override "16:9" "4:3" "2.35:1" "no"

# Built-in and worth knowing (not rebound here, already active):
#   i / I   → toggle mpv's stats overlay (confirms hwdec is actually engaged)
#   1-8     → contrast/brightness/gamma/saturation adjust
#   z / Z   → subtitle delay -/+
