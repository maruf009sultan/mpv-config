# ============================================
# INTUITIVE KEYBINDS (MPC-HC / YouTube style)
# ============================================

# Seeking (Left/Right = 5s, Up/Down = 60s)
RIGHT seek 5
LEFT  seek -5
UP    seek 60
DOWN  seek -60

# Fine seeking (Shift+Arrow = 1s)
Shift+RIGHT seek 1 exact
Shift+LEFT  seek -1 exact

# Volume controls (W/X or Mouse Wheel)
W add volume 5
X add volume -5
MOUSE_BTN3 add volume 5
MOUSE_BTN4 add volume -5

# Playback speed ([ and ] keys)
] add speed 0.1
[ add speed -0.1
BS set speed 1.0

# Play / Pause
SPACE cycle pause
p   cycle pause

# Cycle Audio / Subtitle tracks
a cycle audio
s cycle sub
v cycle sub-visibility

# Screenshot (S key)
S screenshot video

# Fullscreen (F or Double Click)
f cycle fullscreen
MBTN_LEFT cycle fullscreen

# Quit
q quit
ESC quit

# Playlist controls
> playlist-next
< playlist-prev

# Toggle debanding (useful if a video looks overly smoothed out)
D cycle deband

# Cycle interpolation (if you ever want to turn off smooth motion for a specific video)
I cycle interpolation

# Cycle aspect ratio (fixes stretched videos)
A cycle video-aspect-override 16:9 4:3 2.35:1 auto
